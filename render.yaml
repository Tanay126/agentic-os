services:
  - type: web
    name: agentic-os-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.0
      - key: DATA_DIR
        value: ./data
      - key: DEMO_DOCS_DIR
        value: ./demo_docs
      - key: DECAY_INTERVAL_SECONDS
        value: "3600"
      - key: GITHUB_TOKEN
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
